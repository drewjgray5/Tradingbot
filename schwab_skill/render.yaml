# Render Blueprint: Postgres + Redis + FastAPI + Celery worker.
# In Render: blueprint path = render.yaml (repo root). Do not paste documentation URLs as the path.
# Spec: https://render.com/docs/infrastructure-as-code
#
# Repo layout: use this file when the Git repo root IS schwab_skill (next to Dockerfile.saas).
# If the repo is a monorepo with schwab_skill as a subfolder, use render.yaml at the repository root instead.
# Render dashboard: New → Blueprint → connect repo → apply.
#
# First deploy (empty database): set SAAS_BOOTSTRAP_SCHEMA=1 on the web service, deploy once, then clear it
# (SAAS_RUN_ALEMBIC is already set on the web service for later deploys; see docs/SAAS_DEPLOYMENT.md).
#
# Set WEB_ALLOWED_ORIGINS to your public API URL (e.g. https://tradingbot-api.onrender.com).

databases:
  - name: tradingbot-db
    databaseName: tradingbot
    user: tradingbot
    plan: free

services:
  - type: keyvalue
    name: tradingbot-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: tradingbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile.saas
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tradingbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tradingbot-redis
          type: keyvalue
          property: connectionString
      - key: SAAS_HEALTH_REQUIRE_REDIS
        value: "1"
      - key: SAAS_RUN_ALEMBIC
        value: "1"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SCHWAB_MARKET_APP_KEY
        sync: false
      - key: SCHWAB_MARKET_APP_SECRET
        sync: false
      - key: SCHWAB_ACCOUNT_APP_KEY
        sync: false
      - key: SCHWAB_ACCOUNT_APP_SECRET
        sync: false
      - key: SCHWAB_CALLBACK_URL
        sync: false
      - key: SCHWAB_MARKET_CALLBACK_URL
        sync: false
      - key: WEB_ALLOWED_ORIGINS
        sync: false

  - type: worker
    name: tradingbot-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.saas
    dockerContext: .
    dockerCommand: celery -A webapp.tasks worker -Q scan,orders,celery --loglevel=info
    envVars:
      - key: CELERY_WORKER_POOL
        value: solo
      - key: SCAN_STAGE_A_MAX_WORKERS
        value: "2"
      - key: SCAN_STAGE_B_MAX_WORKERS
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: tradingbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: tradingbot-redis
          type: keyvalue
          property: connectionString
      - key: SAAS_RUN_ALEMBIC
        value: "0"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SCHWAB_MARKET_APP_KEY
        sync: false
      - key: SCHWAB_MARKET_APP_SECRET
        sync: false
      - key: SCHWAB_ACCOUNT_APP_KEY
        sync: false
      - key: SCHWAB_ACCOUNT_APP_SECRET
        sync: false
      - key: SCHWAB_CALLBACK_URL
        sync: false
      - key: SCHWAB_MARKET_CALLBACK_URL
        sync: false
