<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to TradingBot Dashboard." />
    <meta name="theme-color" content="#07080d" />
    <title>Sign in — TradingBot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230c0e14'/><path d='M20 65 L35 45 L50 55 L65 30 L80 40' stroke='%2338bdf8' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='80' cy='40' r='5' fill='%23818cf8'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#loginMain">Skip to main content</a>
    <div class="bg-blur bg1"></div>
    <div class="bg-blur bg2"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <main id="loginMain" class="container login-container">
      <header class="card login-card-header">
        <p class="eyebrow">TradingBot</p>
        <h1>Sign in</h1>
        <p class="muted hero-lead">
          Same session as the <a href="/">full dashboard</a>. After signing in, open the dashboard to run scans, backtests, and
          approvals.
        </p>
      </header>

      <section class="card login-body" aria-label="Sign in options">
        <div id="loginSupabase" class="hidden">
          <div id="loginSbOut" class="inline-form compact">
            <label class="field-label" for="loginSbEmail">Email</label>
            <input id="loginSbEmail" type="email" autocomplete="username" placeholder="you@example.com" />
            <label class="field-label" for="loginSbPass">Password</label>
            <input id="loginSbPass" type="password" autocomplete="current-password" placeholder="••••••••" />
            <button id="loginSbSignIn" class="btn secondary" type="button">Sign in</button>
            <button id="loginSbSignUp" class="btn small secondary" type="button">Sign up</button>
          </div>
          <div id="loginSbIn" class="inline-form compact hidden">
            <span id="loginSbLabel" class="muted"></span>
            <button id="loginSbSignOut" class="btn small secondary" type="button">Sign out</button>
          </div>
        </div>
        <details class="login-jwt-details" open>
          <summary class="muted">Access token (JWT)</summary>
          <div class="inline-form compact">
            <label class="field-label" for="loginJwt">Token</label>
            <input id="loginJwt" type="password" autocomplete="off" placeholder="Paste Supabase access token" />
            <button id="loginJwtSave" class="btn small secondary" type="button">Save</button>
          </div>
        </details>
        <p id="loginMessage" class="muted login-message" role="status" aria-live="polite"></p>
        <div class="inline-form login-actions">
          <a class="btn primary" href="/">Open dashboard</a>
          <a class="btn secondary" href="/simple">Simple scan</a>
        </div>
      </section>

      <footer class="site-footer card" role="contentinfo" aria-label="Legal notices">
        <p>
          <strong>Not investment advice.</strong>
          <a href="/static/legal.html">Legal &amp; risk disclosures</a>
        </p>
      </footer>
    </main>
    <script src="/static/auth-jwt-utils.js"></script>
    <script src="/static/login.js" type="module"></script>
  </body>
</html>
